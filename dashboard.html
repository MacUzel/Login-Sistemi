<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body class="dashboard-body">

    <!-- ─── HEADER ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar__brand">
        <!-- Logo ikonu -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>KhronosApp</span>
      </div>

      <!-- Kullanıcı adı ve logout -->
      <div class="topbar__user">
        <span class="topbar__greeting">
          👋 Hoş geldin, <strong id="userEmail">...</strong>
        </span>
        <button class="btn-logout" id="logoutBtn" title="Çıkış yap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Çıkış
        </button>
      </div>
    </header>

    <!-- ─── ANA İÇERİK ──────────────────────────────────────── -->
    <main class="main">

      <!-- ═══ TO-DO LİSTESİ ═══════════════════════════════════ -->
      <section class="panel" id="todoPanel">
        <div class="panel__header">
          <h2 class="panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Yapılacaklar
          </h2>
          <!-- Tamamlanan / Toplam sayacı -->
          <span class="panel__badge" id="todoBadge">0 / 0</span>
        </div>

        <!-- Yeni görev ekleme alanı -->
        <div class="input-row">
          <input
            type="text"
            id="todoInput"
            class="text-input"
            placeholder="Yeni bir görev yaz..."
            maxlength="120"
          />
          <button class="btn-add" id="todoAddBtn" title="Ekle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Ekle
          </button>
        </div>

        <!-- Görev listesi (dinamik olarak doldurulur) -->
        <ul class="todo-list" id="todoList"></ul>

        <!-- Boş durum mesajı -->
        <div class="empty-state" id="todoEmpty">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <p>Henüz görev yok. Bir şeyler ekle!</p>
        </div>
      </section>

      <!-- ═══ NOT ALMA ════════════════════════════════════════ -->
      <section class="panel" id="notesPanel">
        <div class="panel__header">
          <h2 class="panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Notlar
          </h2>
          <span class="panel__badge" id="notesBadge">0 not</span>
        </div>

        <!-- Yeni not ekleme alanı -->
        <div class="note-form">
          <input
            type="text"
            id="noteTitleInput"
            class="text-input"
            placeholder="Başlık (isteğe bağlı)"
            maxlength="60"
          />
          <textarea
            id="noteContentInput"
            class="text-area"
            placeholder="Not içeriğini buraya yaz..."
            rows="3"
            maxlength="500"
          ></textarea>
          <button class="btn-add" id="noteAddBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Not Ekle
          </button>
        </div>

        <!-- Not kartları (dinamik olarak doldurulur) -->
        <div class="notes-grid" id="notesGrid"></div>

        <!-- Boş durum mesajı -->
        <div class="empty-state" id="notesEmpty">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          </svg>
          <p>Henüz not yok. İlk notunu ekle!</p>
        </div>
      </section>

    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
