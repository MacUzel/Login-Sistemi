<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <div class="card">

        <!-- Logo / Başlık Alanı -->
        <div class="card__header">
          <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </div>
          <h1 class="card__title">Hoş Geldiniz</h1>
          <p class="card__subtitle">Hesabınıza giriş yapın</p>
        </div>

        <!-- Demo Bilgi Kutusu -->
        <div class="demo-info">
          <span class="demo-info__icon">ℹ</span>
          <p>
            Demo hesap: <strong>demo@example.com</strong> &nbsp;/&nbsp; <strong>demo123</strong>
          </p>
        </div>

        <!-- Giriş Formu -->
        <form id="loginForm" class="form" novalidate>

          <!-- E-posta Alanı -->
          <div class="form__group" id="emailGroup">
            <label class="form__label" for="email">E-posta Adresi</label>
            <div class="input__wrapper">
              <svg class="input__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                id="email"
                class="form__input"
                placeholder="ornek@email.com"
                autocomplete="email"
              />
            </div>
            <span class="form__error" id="emailError"></span>
          </div>

          <!-- Şifre Alanı -->
          <div class="form__group" id="passwordGroup">
            <label class="form__label" for="password">Şifre</label>
            <div class="input__wrapper">
              <svg class="input__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="password"
                class="form__input"
                placeholder="En az 6 karakter"
                autocomplete="current-password"
              />
              <!-- Şifreyi Göster/Gizle Butonu -->
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Şifreyi göster/gizle">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="form__error" id="passwordError"></span>
          </div>

          <!-- Giriş Butonu -->
          <button type="submit" class="btn btn--primary" id="submitBtn">
            <span class="btn__text">Giriş Yap</span>
            <span class="btn__spinner" id="btnSpinner"></span>
          </button>

        </form>

        <!-- Genel Hata Mesajı -->
        <div class="alert alert--error" id="generalError" role="alert" aria-live="polite">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="generalErrorText"></span>
        </div>

        <!-- Başarı Mesajı -->
        <div class="alert alert--success" id="successMessage" role="alert" aria-live="polite">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>Giriş başarılı! Dashboard'a yönlendiriliyorsunuz...</span>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
